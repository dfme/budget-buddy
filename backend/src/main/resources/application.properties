spring.application.name=budgetbuddy

# --- SQLite DataSource ---
# DB-Pfad via Umgebungsvariable überschreibbar; Default: Datei im Arbeitsverzeichnis
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:budgetbuddy.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
# Schema wird von Flyway verwaltet (ab DB-01), nicht von Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false

# --- Flyway ---
# Im Skeleton deaktiviert (noch keine Migrationen); wird in DB-01 aktiviert
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Secrets (ausschliesslich via Umgebungsvariablen, niemals hardcodiert) ---
app.jwt.secret=${JWT_SECRET:}
anthropic.api.key=${ANTHROPIC_API_KEY:}
