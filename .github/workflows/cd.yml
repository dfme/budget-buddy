name: CD

# Continuous Deployment (INFRA-06): Bei jedem Push auf main wird der
# wiederverwendbare Build/Test-Workflow ausgeführt. Nur wenn er grün ist, wird
# der Render Deploy Hook ausgelöst und anschliessend smoke-getestet.
#
# Der Smoke-Test verifiziert die deployte VERSION, nicht bloss die Erreichbarkeit:
# Er pollt, bis /actuator/info den Commit dieses Runs meldet (INFRA-08).
on:
  push:
    branches: [main]

# Verhindert überlappende Deploys bei schnell aufeinanderfolgenden Pushes:
# Ein laufender Deploy wird abgebrochen, sobald ein neuer Commit auf main landet.
concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build:
    # Backend (mvn verify) + Frontend (test + prod build). Rotes Build/Test blockt
    # via needs den Deploy (AC: Deploy schlägt fehl wenn mvn test oder ng build rot sind).
    uses: ./.github/workflows/build.yml

  deploy:
    name: Deploy to Render + smoke test
    needs: build
    runs-on: ubuntu-latest
    # Airbag: Der Smoke-Test begrenzt sich selbst per Deadline auf 15 min und kann diese
    # um höchstens einen Durchlauf überschreiten (Bedingung wird vor jeder Iteration
    # geprüft: ~35s = sleep + curl-Timeouts). Dieses Limit greift also nur, falls die
    # Schleife wider Erwarten ganz hängt — und liegt bewusst so nah an der Deadline, dass
    # ein Timeout die aussagekräftige ::error::-Meldung ausgibt, statt gekillt zu werden.
    timeout-minutes: 18
    steps:
      - name: Trigger Render deploy hook
        env:
          # Deploy-Hook-URL ausschliesslich als GitHub Secret — nie im Code (AC 4).
          # Anlegen unter: Settings → Secrets and variables → Actions →
          # RENDER_DEPLOY_HOOK_URL (Wert aus Render → Service → Settings → Deploy Hook).
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Secret RENDER_DEPLOY_HOOK_URL ist nicht gesetzt."
            exit 1
          fi
          # -f: non-2xx → Job rot. Der Hook ist fire-and-forget; der eigentliche
          # Deploy läuft danach asynchron auf Render.
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook ausgelöst."

      - name: Smoke test — läuft der Commit dieses Runs?
        env:
          BASE_URL: https://budgetbuddy-0myo.onrender.com
        run: |
          # Der Deploy-Hook ist fire-and-forget: Render baut danach asynchron, während die
          # ALTE Instanz weiterhin Traffic bedient. Ein reiner /actuator/health-Check konnte
          # deshalb von der alten Version grün beantwortet werden — der Job war grün, ohne
          # dass die neue Version je deployt war (INFRA-08).
          #
          # Darum wird die Version verifiziert, nicht bloss die Erreichbarkeit: /actuator/info
          # meldet via RENDER_GIT_COMMIT den Commit, den die laufende Instanz ausführt. Grün
          # nur, wenn dieser dem GITHUB_SHA dieses Runs entspricht UND health 200 liefert.
          #
          # Fehlt RENDER_GIT_COMMIT, meldet die App "unknown" (Fallback in
          # application.properties) — das matcht nie, der Job wird rot statt falsch grün.
          #
          # Timeout: Obergrenze, keine Laufzeit — bei erfolgreichem Deploy bricht die
          # Schleife ab, sobald der SHA matcht. Die vollen 15 min fallen nur bei einem
          # kaputten Deploy an. Ein zu tiefes Limit würde dagegen langsame, aber
          # erfolgreiche Deploys rot melden (Render Free-Tier: kein Build-Cache, langsame
          # Hardware, Cold-Start) — also erneut ein Signal, dem man nicht trauen kann.
          #
          # 15 min = 2.5× der gemessenen Deploy-Dauer (5m53s im ersten Lauf mit
          # Versionsprüfung, Run 29409594339). Puffer für Build-Queue, Registry-Schwankungen
          # und den über die Projektlaufzeit wachsenden Build (INFRA-09).
          #
          # Abbruch über Wall-Clock-Deadline statt Versuchszähler: Jeder Versuch kostet
          # neben dem sleep bis zu --max-time pro curl. Ein Zähler begrenzt daher Versuche,
          # nicht Zeit — bei hängendem Server (TCP offen, keine Antwort) lief die alte
          # Variante bis zu 33 statt 20 min und wurde vom Job-Airbag gekillt, noch bevor
          # die ::error::-Meldung unten ausgegeben werden konnte (INFRA-09).
          timeout_seconds=900   # 15 min
          sleep_seconds=15
          log_every=4           # Lebenszeichen, wenn sich der Zustand nicht ändert
          started_at=$(date +%s)
          deadline=$(( started_at + timeout_seconds ))
          attempt=0
          last_state=""
          echo "Warte auf Deployment von Commit $GITHUB_SHA (bis zu $((timeout_seconds / 60)) min)..."
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$(( attempt + 1 ))
            elapsed=$(( $(date +%s) - started_at ))
            # || true: Der Step läuft unter `bash -e`; ein fehlschlagendes curl (Service
            # baut noch / schläft) würde ihn sonst sofort abbrechen. Bei Fehler liefert
            # curl -w bereits "000", ein zusätzliches echo würde nur "000000" ergeben.
            deployed=$(curl -s --max-time 10 "$BASE_URL/actuator/info" \
              | jq -r '.app.commit // empty' 2>/dev/null || true)
            # Präfix- statt Exakt-Vergleich: GITHUB_SHA ist immer der volle 40-Zeichen-SHA.
            # Render liefert zwar ebenfalls den vollen SHA (verifiziert in Run 29409594339),
            # dokumentiert das Format aber nicht — die Toleranz kostet nichts und schützt
            # vor einem stillen Formatwechsel. Die Guards halten den Vergleich dicht: "" wäre
            # Präfix von allem, < 7 Zeichen kein belastbarer Nachweis. "unknown" (Fallback
            # ohne RENDER_GIT_COMMIT) ist nie ein SHA-Präfix.
            if [ -n "$deployed" ] && [ "${#deployed}" -ge 7 ] \
               && [ "${GITHUB_SHA#"$deployed"}" != "$GITHUB_SHA" ]; then
              health=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/actuator/health" || true)
              if [ "$health" = "200" ]; then
                # Den GEMELDETEN Commit loggen, nicht den erwarteten: Nur so ist im Log
                # nachvollziehbar, was die Instanz tatsächlich ausführt (INFRA-09).
                # Dauer hier frisch berechnen statt $elapsed (das stammt von vor den curls).
                echo "Neue Version live nach $(( $(date +%s) - started_at ))s (Versuch $attempt): Instanz meldet Commit $deployed, health HTTP 200."
                exit 0
              fi
              state="commit-da-health-$health"
              message="Commit $deployed ist da, aber health HTTP $health"
            else
              state="version-${deployed:-unerreichbar}"
              message="läuft '${deployed:-nicht erreichbar}', erwartet '$GITHUB_SHA'"
            fi
            # Nur bei Zustandswechsel loggen, sonst periodisch als Lebenszeichen — ein
            # Deploy erzeugte sonst >20 identische Zeilen (INFRA-09).
            if [ "$state" != "$last_state" ] || [ $(( attempt % log_every )) -eq 0 ]; then
              echo "Versuch $attempt (${elapsed}s): $message"
            fi
            last_state="$state"
            sleep "$sleep_seconds"
          done
          echo "::error::Smoke-Test fehlgeschlagen — nach $(( $(date +%s) - started_at ))s ($attempt Versuche) meldet $BASE_URL nicht Commit $GITHUB_SHA mit health 200. Zuletzt gesehen: ${deployed:-nicht erreichbar}. Deploy-Log auf Render prüfen."
          exit 1
