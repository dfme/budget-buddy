name: Build

# Wiederverwendbarer Build/Test-Workflow (INFRA-06): Backend (mvn verify) und
# Frontend (unit test + prod build). Single Source of Truth — aufgerufen von
# ci.yml (Pull Requests) und cd.yml (Push auf main, vor dem Render-Deploy).
on:
  workflow_call:

jobs:
  backend:
    name: Backend (mvn verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test
        run: ./mvnw -B verify

  frontend:
    name: Frontend (test + prod build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --no-watch

      - name: Production build
        run: npx ng build --configuration production
