spring.application.name=budgetbuddy

# --- SQLite DataSource ---
# DB-Pfad via Umgebungsvariable überschreibbar; Default: Datei im Arbeitsverzeichnis
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:budgetbuddy.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
# Schema wird von Flyway verwaltet (ab DB-01), nicht von Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false

# --- Flyway ---
# Startup-Migration aktiviert (DB-01). Schema wird ausschliesslich von Flyway verwaltet.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
# health: Liveness für Render (render.yaml healthCheckPath) und den CD-Smoke-Test.
# info: meldet den ausgeführten Commit, damit der CD-Smoke-Test die deployte Version
# verifizieren kann statt nur "irgendeine Instanz antwortet" (INFRA-08).
management.endpoints.web.exposure.include=health,info

# Der env-Info-Contributor ist seit Spring Boot 2.6 standardmässig aus; er exponiert
# ausschliesslich Properties unter info.* — kein Env-Dump.
management.info.env.enabled=true

# RENDER_GIT_COMMIT setzt Render automatisch auf den deployten Commit-SHA
# (https://render.com/docs/environment-variables). Ausserhalb von Render (lokal, Tests,
# CI) fehlt die Variable → "unknown". Der CD-Smoke-Test vergleicht diesen Wert mit dem
# GITHUB_SHA des Runs: "unknown" matcht nie, der Job wird also rot statt falsch grün.
info.app.commit=${RENDER_GIT_COMMIT:unknown}

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Secrets (ausschliesslich via Umgebungsvariablen, niemals hardcodiert) ---
# Leer-Default: fehlt JWT_SECRET, schlägt die @NotBlank-Validierung in JwtProperties
# beim Start fehl (Fail-fast) statt einen unsicheren Default zu verwenden.
app.jwt.secret=${JWT_SECRET:}
anthropic.api.key=${ANTHROPIC_API_KEY:}

# --- Kategorisierung via Claude (BE-CAT-02) ---
# Schnelles, günstiges Modell für Single-Label-Klassifikation. Überschreibbar via
# ANTHROPIC_API_MODEL, z.B. um ohne Redeploy auf ein neueres Modell zu wechseln.
# Fehlt der ANTHROPIC_API_KEY, startet die App trotzdem — unbekannte Transaktionen
# werden dann als "Sonstiges" eingestuft (kein Fail-fast, anders als bei JWT_SECRET).
anthropic.api.model=${ANTHROPIC_API_MODEL:claude-haiku-4-5}

# --- JWT (BE-AUTH-01) ---
# Gültigkeitsdauer der Tokens (Spring-Duration-Format, z.B. 24h, 30m).
app.jwt.expiration=24h

# --- Auth-Cookie (BE-AUTH-03) ---
# Secure-Flag des jwt-Cookies. Default false für Dev (HTTP localhost); in Produktion
# via application-prod.properties auf true gesetzt (HTTPS erzwungen).
app.cookie.secure=false
