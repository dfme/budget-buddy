spring.application.name=budgetbuddy

# --- SQLite DataSource ---
# DB-Pfad via Umgebungsvariable überschreibbar; Default: Datei im Arbeitsverzeichnis
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:budgetbuddy.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
# Schema wird von Flyway verwaltet (ab DB-01), nicht von Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false

# --- Flyway ---
# Startup-Migration aktiviert (DB-01). Schema wird ausschliesslich von Flyway verwaltet.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Secrets (ausschliesslich via Umgebungsvariablen, niemals hardcodiert) ---
# Leer-Default: fehlt JWT_SECRET, schlägt die @NotBlank-Validierung in JwtProperties
# beim Start fehl (Fail-fast) statt einen unsicheren Default zu verwenden.
app.jwt.secret=${JWT_SECRET:}
anthropic.api.key=${ANTHROPIC_API_KEY:}

# --- JWT (BE-AUTH-01) ---
# Gültigkeitsdauer der Tokens (Spring-Duration-Format, z.B. 24h, 30m).
app.jwt.expiration=24h

# --- Auth-Cookie (BE-AUTH-03) ---
# Secure-Flag des jwt-Cookies. Default false für Dev (HTTP localhost); in Produktion
# via application-prod.properties auf true gesetzt (HTTPS erzwungen).
app.cookie.secure=false
