# --- Produktions-Profil (Render, Docker) ---
# Aktiviert via SPRING_PROFILES_ACTIVE=prod (siehe render.yaml).
# Überschreibt nur die produktionsrelevanten Werte; der Rest wird aus
# application.properties geerbt.

# --- SQLite DataSource ---
# ACHTUNG: Render Free-Services haben ein ephemeres Filesystem. Die SQLite-Datei
# liegt im Arbeitsverzeichnis des Containers und geht bei jedem Redeploy, jedem
# Restart UND jedem Spin-Down verloren (Spin-Down: nach 15 Min ohne Traffic).
#
# Ein Persistent Disk ist auf dem Free-Plan nicht buchbar — er setzt ein Upgrade
# des Instance-Types voraus. Der Entscheid dazu ist offen und wird in Issue #78
# vorbereitet; Optionen und Kosten stehen in ADR-5, Abschnitt "Offene Frage:
# Persistenz in Produktion".
#
# SQLITE_DB_PATH bleibt überschreibbar, damit die Datei ohne Code-Änderung auf
# einen persistenten Mount gelegt werden kann, sobald einer existiert.
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:budgetbuddy.db}

# --- Server ---
# Render gibt den zu bindenden Port über die Umgebungsvariable PORT vor.
server.port=${PORT:8080}

# --- CORS ---
# In Produktion liefern SPA und API denselben Origin aus (SPA gebündelt im JAR),
# daher ist kein CORS nötig (vgl. ADR-0 / ADR-10). Es wird bewusst keine
# CORS-Mapping-Konfiguration aktiviert.

# --- Auth-Cookie (BE-AUTH-03) ---
# Produktion läuft über HTTPS: jwt-Cookie nur über sichere Verbindungen senden.
app.cookie.secure=true

# --- Logging ---
logging.level.root=INFO
logging.level.com.budgetbuddy=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
